seed: 42

data:
  train_path: data/processed/url_train.parquet
  val_path: data/processed/url_val.parquet
  test_path: data/processed/url_test.parquet
  label_col: is_phish

model:
  type: lightgbm
  params:
    objective: binary
    metric: [auc, binary_logloss]
    boosting_type: gbdt
    num_leaves: 127
    learning_rate: 0.05
    feature_fraction: 0.9
    bagging_fraction: 0.85
    bagging_freq: 5
    min_data_in_leaf: 50
    lambda_l2: 1.0
    verbose: -1

training:
  num_boost_round: 2000
  early_stopping_rounds: 100
  cv_folds: 5

calibration:
  method: isotonic

artifacts:
  model_path: models/checkpoints/url_model.lgb
  calibrator_path: models/checkpoints/url_calibrator.pkl
  feature_names_path: models/checkpoints/url_features.json

logging:
  wandb_project: phishguard
  wandb_run_name: url_lgbm_v1
