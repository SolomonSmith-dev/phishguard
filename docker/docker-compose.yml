services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: phishguard:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://phishguard:phishguard@db:5432/phishguard
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: phishguard
      POSTGRES_PASSWORD: phishguard
      POSTGRES_DB: phishguard
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phishguard"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
